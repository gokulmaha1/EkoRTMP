<!DOCTYPE html>
<html lang="ta">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EkoRTMP - Live Voting Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Madurai:wght@400;700&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Hind Madurai', sans-serif;
            background: transparent;
            overflow: hidden;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .party-card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        .vote-popup {
            animation: slideIn 0.5s ease-out forwards;
        }

        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.8);
            border-top: 2px solid #ef4444;
        }

        .ticker {
            display: inline-block;
            white-space: nowrap;
            padding-right: 100%;
            animation: ticker 30s linear infinite;
        }

        @keyframes ticker {
            0% {
                transform: translate3d(0, 0, 0);
            }

            100% {
                transform: translate3d(-100%, 0, 0);
            }
        }

        .count-up {
            font-variant-numeric: tabular-nums;
        }

        /* Progress Bar Styles */
        .progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ef4444, #f87171);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
            transition: width 0.1s linear;
        }
    </style>
</head>

<body>
    <!-- Main Overlay Container -->
    <div class="relative w-full h-full flex flex-col justify-end p-8">
        <!-- Progress Bar Indicator -->
        <div class="progress-container">
            <div id="refresh-progress" class="progress-bar"></div>
        </div>

        <!-- Live Counters (Left Sidebar Style) -->
        <div class="absolute top-8 left-8 flex flex-col gap-4 w-72">
            <div class="glass-panel rounded-2xl p-4 shadow-2xl">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
                    <span class="text-white font-bold tracking-wider text-sm uppercase">Live Voting Results</span>
                </div>

                <div id="counters" class="flex flex-col gap-3">
                    <!-- Party counters will be injected here -->
                </div>
            </div>

            <!-- Latest Voters Feed -->
            <div class="glass-panel rounded-2xl p-4 shadow-2xl flex-1 overflow-hidden">
                <h3 class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mb-3">Latest Voters</h3>
                <div id="voter-feed" class="flex flex-col gap-2">
                    <!-- Voters injected here -->
                </div>
            </div>
        </div>

        <!-- Just Now Voted Popup -->
        <div id="popup-container" class="absolute top-8 right-8 flex flex-col gap-4 items-end">
            <!-- Popups injected here -->
        </div>

        <!-- Bottom Sections -->
        <div class="w-full">
            <!-- Scrolling Ticker -->
            <div class="ticker-wrap h-12 flex items-center mb-4 rounded-lg">
                <div id="ticker" class="ticker text-white font-bold text-lg">
                    <!-- Ticker items injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const WS_URL = `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}/ws/news`;

        let voteCounts = {};
        let ttsQueue = [];
        let isSpeaking = false;
        let refreshStartTime = Date.now();
        const REFRESH_INTERVAL = 30000; // 30 seconds

        function updateProgressBar() {
            const elapsed = Date.now() - refreshStartTime;
            const progress = Math.min((elapsed / REFRESH_INTERVAL) * 100, 100);
            document.getElementById('refresh-progress').style.width = progress + '%';
            requestAnimationFrame(updateProgressBar);
        }

        function resetRefreshTimer() {
            refreshStartTime = Date.now();
        }

        async function fetchCounts() {
            try {
                console.log("[Overlay] Fetching vote counts from:", `${API_BASE}/votes/counts`);
                const res = await fetch(`${API_BASE}/votes/counts`);
                const data = await res.json();
                console.log("[Overlay] Received vote counts:", data);
                voteCounts = data;
                renderCounters();
            } catch (e) {
                console.error("[Overlay] Error fetching counts:", e);
            }
        }

        function renderCounters() {
            const container = document.getElementById('counters');
            const parties = [
                { code: 'DMK_PLUS', tamil: 'திமுக+', color: 'bg-red-600' },
                { code: 'ADMK_PLUS', tamil: 'அதிமுக+', color: 'bg-green-600' },
                { code: 'NTK', tamil: 'நாம் தமிழர்', color: 'bg-yellow-500' },
                { code: 'TVK', tamil: 'தவெக', color: 'bg-blue-600' }
            ];

            container.innerHTML = parties.map(p => {
                const count = voteCounts[p.code] || 0;
                return `
                    <div class="party-card flex items-center justify-between p-3 rounded-xl bg-white/5 border border-white/10">
                        <div class="flex items-center gap-3">
                            <div class="w-1.5 h-8 ${p.color} rounded-full"></div>
                            <span class="text-white font-bold text-lg">${p.tamil}</span>
                        </div>
                        <span class="text-3xl font-black text-white count-up">${count.toLocaleString()}</span>
                    </div>
                `;
            }).join('');
        }

        async function fetchLatestVoters() {
            try {
                console.log("[Overlay] Fetching latest voters from:", `${API_BASE}/votes/latest`);
                const res = await fetch(`${API_BASE}/votes/latest`);
                const voters = await res.json();
                console.log("[Overlay] Received latest voters:", voters);
                renderVoterFeed(voters);
                updateTicker(voters);
                resetRefreshTimer();
            } catch (e) {
                console.error("[Overlay] Error fetching latest voters:", e);
            }
        }

        function renderVoterFeed(voters) {
            const container = document.getElementById('voter-feed');
            container.innerHTML = voters.slice(0, 5).map(v => `
                <div class="flex items-center gap-3 p-2 rounded-lg bg-white/5 animate-fade-in">
                    <img src="${v.profile_image_url}" class="w-8 h-8 rounded-full border border-white/20" alt="">
                    <div class="min-w-0">
                        <p class="text-white text-xs font-bold truncate">${v.display_name}</p>
                        <p class="text-gray-400 text-[10px] uppercase font-bold tracking-wider">${v.party_tamil}</p>
                    </div>
                </div>
            `).join('');
        }

        function updateTicker(voters) {
            const container = document.getElementById('ticker');
            const items = voters.map(v => `<span class="mx-8">${v.display_name} <span class="text-red-500">${v.party_tamil}</span>-க்கு வாக்களித்தார்</span>`);
            container.innerHTML = items.join(' • ');
        }

        function showVotePopup(voter) {
            const container = document.getElementById('popup-container');
            const div = document.createElement('div');
            div.className = 'vote-popup glass-panel p-4 rounded-2xl flex items-center gap-4 shadow-2xl min-w-[300px] transform transition-all';
            div.innerHTML = `
                <div class="relative">
                    <img src="${voter.image}" class="w-12 h-12 rounded-full border-2 border-red-500" alt="">
                    <div class="absolute -bottom-1 -right-1 bg-red-500 text-white text-[8px] px-1 rounded-full font-bold">VOTED</div>
                </div>
                <div>
                    <p class="text-white font-bold">${voter.name} <span class="text-red-400">just voted!</span></p>
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-wider">${voter.party}</p>
                </div>
            `;
            container.appendChild(div);

            // TTS
            queueTTS(`${voter.name} ${voter.party} க்கு வாக்களித்தார்`);

            setTimeout(() => {
                div.style.opacity = '0';
                div.style.transform = 'translateY(-20px)';
                setTimeout(() => div.remove(), 500);
            }, 5000);
        }

        function queueTTS(text) {
            ttsQueue.push(text);
            processTTS();
        }

        function processTTS() {
            if (isSpeaking || ttsQueue.length === 0) return;
            isSpeaking = true;
            const text = ttsQueue.shift();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ta-IN';
            utterance.rate = 1.0;
            utterance.onend = () => {
                isSpeaking = false;
                processTTS();
            };
            window.speechSynthesis.speak(utterance);
        }

        // WebSocket for real-time updates
        function connectWS() {
            const ws = new WebSocket(WS_URL);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'NEW_VOTE') {
                    showVotePopup(data.payload);
                    fetchCounts();
                    fetchLatestVoters();
                }
            };
            ws.onclose = () => setTimeout(connectWS, 3000);
        }

        // Initialize
        fetchCounts();
        fetchLatestVoters();
        connectWS();
        updateProgressBar();

        // Interval updates for safety
        setInterval(fetchCounts, REFRESH_INTERVAL);
        setInterval(fetchLatestVoters, REFRESH_INTERVAL);

    </script>
</body>

</html>
