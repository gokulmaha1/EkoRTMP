<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23ef4444%22/></svg>">
    <meta charset="UTF-8">
    <title>EKO TV Overlay</title>
    <!-- Import Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500;700&family=Baloo+Thambi+2:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* --- RESET & VARIABLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* Palette */
            --header-bg: #b90909;
            /* Deep Red */
            --footer-bg: #ffffff;
            --text-black: #000000;
            --text-white: #ffffff;
            --accent-gold: #f1c40f;

            /* Dimensions */
            --header-height: 60px;
            --ticker-height: 70px;
        }

        body {
            background-color: #000;
            /* Chroma Key or Video BG */
            overflow: hidden;
            font-family: 'Roboto', 'Baloo Thambi 2', sans-serif;
            width: 1280px;
            height: 720px;
        }

        /* --- MAIN LAYOUT (GRID) --- */
        .container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: var(--header-height) 1fr var(--ticker-height);
            position: relative;
        }

        /* --- HEADER SECTION --- */
        /* --- VISUAL POLISH (PREMIUM TV LOOK) --- */
        :root {
            /* Simplified Gradients for Performance */
            --header-gradient: #b90909;
            /* Solid color is faster */
            /* --gloss-overlay: linear-gradient(to bottom, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.1) 100%); */
            /* --shadow-soft: 0 4px 10px rgba(0, 0, 0, 0.5); */
            /* Removed shadow */
        }

        /* --- HEADER SECTION --- */
        .top-header {
            grid-row: 1;
            background: var(--header-gradient);
            /* TABLE LAYOUT: Maximum Compatibility & Stability */
            display: table;
            width: 100%;
            table-layout: fixed;
            padding: 5px 10px;
            border-bottom: 3px solid #ffcc00;
            /* Gold Accent Bottom */
            z-index: 100;
            /* box-shadow: var(--shadow-soft); */
            height: var(--header-height);
            position: relative;
        }

        /* Gloss Shine Effect (Pseudo-element for safety) 
        .top-header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 50%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 100%);
            pointer-events: none;
            z-index: 0;
        }
        */

        /* Header Columns */
        .header-left {
            display: table-cell;
            width: 200px;
            vertical-align: middle;
            text-align: left;
            height: 100%;
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .header-center {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
            height: 100%;
            overflow: hidden;
            padding: 0 20px;
            position: relative;
            z-index: 2;
            width: 80%;
        }

        .header-right {
            display: table-cell;
            width: 200px;
            vertical-align: middle;
            text-align: right;
            height: 100%;
            position: relative;
            z-index: 2;
            padding-right: 15px;
        }

        /* Header Elements */
        .location-tag {
            background: #f0f0f0;
            /* Simplified gradient */
            color: #b90909;
            padding: 3px 7px;
            border-radius: 4px;
            /* Condensed Font */
            font-weight: 700;
            font-size: 17px;
            text-transform: uppercase;
            /* box-shadow: 0 3px 6px rgba(0, 0, 0, 0.3); */
            display: inline-flex;
            /* Fix flex alignment inside table cell */
            align-items: center;
            gap: 8px;
            border: 1px solid #ccc;
        }

        .breaking-text {
            color: white !important;
            /* Better Tamil Font support */
            font-size: 32px;
            /* Large TV Size */
            font-weight: 700;
            white-space: nowrap;
            /* text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5); */
            /* Simplified Shadow */
            text-shadow: 1px 1px 0 #000;
            /* Ensure Visibility */
            display: block !important;
            opacity: 1 !important;
            visibility: visible !important;
            text-align: center;
            /* Center multi-line text */
            line-height: 1.2;
        }

        .logo-img {
            position: absolute;
            top: -17px;
            right: -11px;
            height: 86px;
            /* Much larger logo */
            width: auto;
            object-fit: contain;
            display: inline-block !important;
            z-index: 999;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
            /* Adds depth over the overlap */
        }

        /* --- MAIN CONTENT (Video + L-Bar) --- */
        .main-content {
            grid-row: 2;
            position: relative;
            background-color: transparent;
            display: flex;
            overflow: hidden;
        }

        .video-wrapper {
            flex-grow: 1;
            position: relative;
        }

        /* L-Bar (Side Panel) */
        .l-bar {
            width: 0;
            /* Hidden by default */
            background: #000;
            transition: width 0.5s ease;
            display: none;
        }

        /* Media Elements */
        #videoPlayer,
        #imagePlayer,
        #webview {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            border: none;
        }

        /* --- FOOTER SECTION --- */
        .bottom-footer {
            grid-row: 3;
            background-color: var(--footer-bg);
            /* TABLE LAYOUT: For Stability */
            display: table;
            width: 100%;
            table-layout: fixed;
            border-top: 4px solid #cc0000;
            z-index: 100;
            height: var(--ticker-height);
            /* box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.2); */
        }

        .ticker-label {
            display: table-cell;
            width: 125px;
            vertical-align: middle;
            background: var(--header-gradient);
            color: white;
            font-size: 22px;
            font-weight: 700;
            padding: 0 15px;
            height: 100%;
            z-index: 10;
            text-transform: uppercase;
            /* box-shadow: 4px 0 10px rgba(0, 0, 0, 0.3); */
            /* Separation Shadow */
            position: relative;
        }

        /* Ticker Triangle Arrow */
        .ticker-label::after {
            content: '';
            position: absolute;
            right: -10px;
            top: 0;
            bottom: 0;
            width: 10px;
            background: inherit;
            clip-path: polygon(0 0, 100% 50%, 0 100%);
            z-index: 12;
        }

        .ticker-container {
            display: table-cell;
            vertical-align: middle;
            background: white;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .ticker-content {
            display: block;
            width: 100%;
            padding-top: 5px;
            /* Center text vertically */
        }

        .ticker-item {
            font-size: 28px;
            font-weight: 600;
            color: #000;
            margin-right: 80px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .footer-right {
            display: table-cell;
            width: 240px;
            /* Slightly wider */
            vertical-align: middle;
            background: #f0f0f0;
            /* Simplified gradient */
            height: 100%;
            border-left: 2px solid #ddd;
            padding: 0 15px;
            z-index: 20;
            /* box-shadow: -4px 0 10px rgba(0, 0, 0, 0.1); */
        }

        .live-badge {
            background: #d60000;
            color: white;
            font-weight: 700;
            padding: 7px 15px;
            border-radius: 25px;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-left: 10px;
        }

        .datetime {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
        }

        .time-display {
            font-family: 'Oswald', sans-serif;
            font-size: 25px;
            font-weight: 700;
            color: #2c3e50;
            line-height: 1;
            margin-bottom: 4px;
            margin-right: 3px;
        }

        .date-display {
            font-size: 13px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Blink Animation */
        .blink-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: blink 1s infinite;
            float: left;
            margin-top: 9px;
            margin-left: 2px;
        }

        @keyframes ticker-scroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        @keyframes blink {
            50% {
                opacity: 0.5;
            }
        }

        /* --- ANIMATIONS --- */
        @keyframes slideOutDown {
            0% {
                transform: translateY(0);
                opacity: 1;
            }

            100% {
                transform: translateY(100%);
                opacity: 0;
            }
        }

        @keyframes slideInDown {
            0% {
                transform: translateY(-100%);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .animate-out {
            animation: slideOutDown 0.5s forwards;
        }

        .animate-in {
            animation: slideInDown 0.5s forwards;
        }

        /* --- SMOOTH TICKER --- */
        .ticker-wrapper {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
        }

        .ticker-track {
            display: flex;
            white-space: nowrap;
            will-change: transform;
            /* Animation applied via JS for dynamic speed */
        }

        @keyframes scroll-linear {
            0% {
                transform: translate3d(0, 0, 0);
            }

            100% {
                transform: translate3d(-50%, 0, 0);
            }
        }

        /* --- NEWS PRESENTATION (SPLIT VIEW) --- */
        .news-presentation {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            background: #e0e0e0;
            /* Simplified gradient */
            z-index: 50;
            animation: slideInRight 0.5s ease-out;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(0);
            }
        }

        /* --- LAYOUT MODES --- */
        .news-presentation.no-media .np-media {
            display: none !important;
        }

        .news-presentation.no-media .np-content {
            flex: 1;
            /* Take full width */
            padding: 80px;
            /* More padding for cleaner look */
            align-items: center;
            /* Center text */
            text-align: center;
        }

        .np-media {
            flex: 6;
            /* 60% width */
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-right: 4px solid #cc0000;
        }

        .np-media img,
        .np-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .placeholder-icon {
            font-size: 80px;
            color: #555;
        }

        .np-content {
            flex: 4;
            /* 40% width */
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: white;
            /* box-shadow: -5px 0 15px rgba(0, 0, 0, 0.1); */
        }

        /* --- ANIMATIONS: Text & Media --- */
        /* Ken Burns Removed for Performance */

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .ken-burns-active {
            opacity: 1;
            /* Non-empty rule */
        }

        @keyframes newsFadeIn {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        .anim-title {
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
        }

        .anim-desc {
            opacity: 0;
            /* Tamil TV Style: Sharp wipe from left with slight slide */
            /* Simplified Fade In */
            animation: newsFadeIn 0.5s ease-out 0.2s forwards;
            background: rgba(0, 0, 0, 0.03);
            /* Subtle backdrop */
            padding: 15px;
            border-left: 4px solid #b90909;
            /* Red accent line */
            border-radius: 0 8px 8px 0;
        }

        .anim-meta {
            opacity: 0;
            animation: fadeIn 1s ease-out 0.8s forwards;
        }

        /* --- TRANSITIONS --- */
        .page-exit {
            animation: slideOutLeft 0.5s ease-in forwards;
        }

        .page-enter {
            animation: slideInRight 0.5s ease-out forwards;
        }

        @keyframes slideOutLeft {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(-100%);
                opacity: 0;
            }
        }

        .np-tag {
            background: #b90909;
            color: white;
            align-self: flex-start;
            padding: 5px 15px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 18px;
            margin-bottom: 20px;
            border-radius: 4px;
            opacity: 0;
            /* Animation handled by JS adding classes */
        }

        .anim-tag-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        .np-content h1 {
            font-size: 36px;
            line-height: 1.2;
            margin-bottom: 20px;
            color: #2c3e50;
            font-family: 'Baloo Thambi 2', sans-serif;
            /* Animation handled by class .anim-title */
        }

        .np-content p {
            font-size: 22px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 30px;
            font-family: 'Roboto', sans-serif;
            /* Animation handled by class .anim-desc */
        }

        .np-meta {
            margin-top: auto;
            border-top: 1px solid #ddd;
            padding-top: 15px;
            color: #888;
            font-size: 16px;
            font-weight: 600;
            /* Animation handled by class .anim-meta */
        }

        /* Voting Presentation - PROFESSIONAL TV STYLE */
        .voting-presentation {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            display: flex;
            flex-direction: column;
            /* Changed to column */
            padding: 5px 60px;
            gap: 20px;
            z-index: 60;
            animation: fadeIn 1s ease-out;
        }

        .vp-main {
            flex: 1;
            /* Adjust to take available space */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .vp-sidebar {
            width: 100%;
            display: flex;
            flex-direction: column;
            margin-top: auto;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 15px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .vp-title-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .vote-instructions {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: pulseCmd 4s infinite;
        }

        .vote-commands {
            display: flex;
            gap: 8px;
        }

        .vote-cmd {
            background: #ef4444;
            /* Red */
            color: white;
            padding: 2px 10px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }

        @keyframes pulseCmd {
            0% {
                box-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
                border-color: rgba(255, 255, 255, 0.2);
            }

            50% {
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
                border-color: rgba(255, 255, 255, 0.8);
            }

            100% {
                box-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
                border-color: rgba(255, 255, 255, 0.2);
            }
        }

        /* Ticker-like horizontal voter feed */
        #vpVoterFeed {
            display: flex;
            flex-direction: row;
            gap: 20px;
            overflow: hidden;
            white-space: nowrap;
        }

        .vp-live-dot {
            width: 15px;
            height: 15px;
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 20px #ef4444;
            animation: pulse 1.5s infinite;
        }

        .vp-title {
            color: white;
            font-size: 32px;
            font-weight: 900;
            /* Corrected from 'font-black' */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #vpCounters {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            flex: 1;
        }

        .glass-box {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        @property --border-angle {
            syntax: "<angle>";
            inherits: false;
            initial-value: 0deg;
        }

        .vp-party-card {
            background: linear-gradient(to top, rgba(20, 20, 40, 0.95), rgba(40, 40, 80, 0.8));
            backdrop-filter: blur(10px);
            transform: translateZ(0); /* Force layer acceleration */
            /* Animated border replaces static border */
            border-radius: 20px 20px 20px 20px;
            /* Arched tops */
            padding: 30px 15px 0 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.8s ease-out both;
            animation-delay: var(--delay, 0s);
        }

        .vp-party-card::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 20px 20px 20px 20px;
            padding: 4px;
            /* Border thickness */
            /* The animated conic gradient */
            background: conic-gradient(from var(--border-angle),
                    transparent 0%,
                    rgba(255, 215, 0, 0.9) 10%,
                    rgba(255, 0, 0, 0.9) 25%,
                    transparent 50%);
            /* Mask to apply it only to the border area */
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            z-index: 10;
            pointer-events: none;
            animation: spinGlow 3s linear infinite;
            animation-delay: var(--delay, 0s);
        }

        @keyframes spinGlow {
            100% {
                --border-angle: 360deg;
            }
        }

        .vp-party-card:hover {
            background: linear-gradient(to top, rgba(30, 30, 50, 0.95), rgba(50, 50, 90, 0.5));
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .vp-leader-container {
            width: 100%;
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            border: none;
            border-radius: 0;
            background: transparent;
            overflow: hidden;
            margin-top: 15px;
        }

        .vp-leader-img {
            width: 100%;
            height: auto;
            max-height: 250px;
            object-fit: contain;
            object-position: bottom;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.5));
        }

        .vp-party-info {
            text-align: center;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .vp-party-name {
            display: block;
            color: white;
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
        }

        .vp-party-count {
            display: inline-block;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 25px;
            border-radius: 20px;
            color: white;
            font-size: 48px;
            font-weight: 900;
            font-family: 'Oswald', sans-serif;
            line-height: 1.1;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .vp-party-symbol {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 100px;
            height: 100px;
            background: #ffffff;
            border-radius: 20%;
            border: #cc0000 3px solid;
            padding: 2px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            object-fit: contain;
            filter: none;
            z-index: 3;
            pointer-events: none;
            will-change: transform;
            transform: translateZ(0);
            animation: spinBadge 6s linear infinite;
        }

        @keyframes spinBadge {
            0% {
                transform: perspective(400px) rotateY(0deg);
            }

            100% {
                transform: perspective(400px) rotateY(360deg);
            }
        }

        .vp-voter-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 10px 15px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            min-width: 250px;
            flex-shrink: 0;
            animation: slideInRight 0.5s ease-out;
        }

        .vp-voter-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .vp-voter-info p {
            margin: 0;
            color: white;
            font-size: 14px;
            font-weight: 700;
            /* Corrected from 'font-bold' */
        }

        .vp-voter-info span {
            font-size: 11px;
            color: #ef4444;
            font-weight: 900;
            text-transform: uppercase;
        }

        @keyframes scrollHorizontal {
            0% {
                transform: translate3d(0, 0, 0);
            }

            100% {
                transform: translate3d(-50%, 0, 0);
            }
        }

        .animate-scroll {
            animation: scrollHorizontal 30s linear infinite;
            will-change: transform;
        }

    </style>
</head>

<body>

                    <div id="dateDisplay" class="date-display">01/01/2026</div>

    <!-- SCRIPT -->
    <script>
        // CONFIG
        const DEFAULT_LOGO = "/media/logo.gif";
        const API_BASE = window.location.origin + '/api';
        const WS_URL = 'ws://' + window.location.host + '/ws/news';

        // STATE
        let newsItems = [];
        let headlineIndex = 0;
        let headlineInterval = null;


        // --- CLOCK ---
        function updateTime() {
            const now = new Date();
            // Force IST Timezone
            const timeStr = now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: true,
                timeZone: 'Asia/Kolkata'
            });
            const dateStr = now.toLocaleDateString('en-GB', {
                timeZone: 'Asia/Kolkata'
            }); // DD/MM/YYYY

            document.getElementById('clock').innerText = timeStr;
            document.getElementById('dateDisplay').innerText = dateStr;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // --- LOG DATA & CONFIG ---
        async function fetchConfig() {
            try {
                const res = await fetch(API_BASE + '/config');
                const conf = await res.json();
                applyConfig(conf);
            } catch (e) {
                console.error("Config Fetch Error:", e);
                // Fallback already in HTML
            }
        }

        function applyConfig(conf) {
            const root = document.documentElement;

            // Colors
            if (conf.brand_color_primary) root.style.setProperty('--header-bg', conf.brand_color_primary);
            if (conf.brand_color_dark) document.body.style.backgroundColor = conf.brand_color_dark; // Debug bg

            // Logo
            const logoUrl = conf.logo_url || DEFAULT_LOGO;
            const logoEl = document.getElementById('headerLogo');
            if (logoEl) {
                logoEl.src = logoUrl;
                logoEl.style.display = 'block'; // Force show
            }

            // Text Labels
            if (conf.location_label) document.getElementById('locationText').innerText = conf.location_label;

            // L-Bar Logic
            const lBar = document.getElementById('lBar');
            const wrapper = document.querySelector('.main-content');

            if (conf.layout_mode === 'L_BAR') {
                const w = conf.lbar_width || 25;
                lBar.style.display = 'block';
                lBar.style.width = w + '%';
                lBar.style.backgroundColor = conf.lbar_bg_color || '#000';

                // Position
                wrapper.style.flexDirection = (conf.lbar_position === 'LEFT') ? 'row-reverse' : 'row';

                // Content
                const contentDiv = document.getElementById('lBarContent');
                if (conf.lbar_content_type === 'IMAGE' && conf.lbar_content_data) {
                    contentDiv.innerHTML = `<img src="${conf.lbar_content_data}" style="width:100%;height:100%;object-fit:cover;">`;
                } else if (conf.lbar_content_type === 'URL') {
                    contentDiv.innerHTML = `<iframe src="${conf.lbar_content_data}" style="width:100%;height:100%;border:none;"></iframe>`;
                }
            } else {
                lBar.style.width = '0';
                setTimeout(() => lBar.style.display = 'none', 500);
            }

            // Voting Config / Overlay Mode
            if (conf.overlay_display_mode) {
                currentOverlayMode = conf.overlay_display_mode;
                // Force update UI if not in auto
                if (currentOverlayMode !== 'auto') {
                    updateDisplayModeDirectly();
                }
            }
        }

        // --- VOTING HEADER ROTATOR ---
        const votingHeadlines = [
            "மாபெரும் 2026 தேர்தல் கருத்துக்கணிப்பு",
            "இலக்கு 1 கோடி வாக்காளர்கள்",
            "Comment your Vote - Live results"
        ];
        let votingHeaderIndex = 0;
        let votingHeaderInterval = null;

        function startVotingHeaderRotation() {
            if (votingHeaderInterval) clearInterval(votingHeaderInterval);
            votingHeaderInterval = setInterval(() => {
                if (currentOverlayMode !== 'voting') {
                    clearInterval(votingHeaderInterval);
                    return;
                }
                const el = document.getElementById('topHeadline');

                el.classList.remove('animate-in');
                el.classList.add('animate-out');

                setTimeout(() => {
                    votingHeaderIndex = (votingHeaderIndex + 1) % votingHeadlines.length;
                    el.innerText = votingHeadlines[votingHeaderIndex];
                    el.style.fontSize = "26px";
                    el.style.whiteSpace = "nowrap";

                    el.classList.remove('animate-out');
                    el.classList.add('animate-in');
                }, 500);
            }, 2500); // 2.5s cycle per user request (2s visible + 0.5s transition)
        }

        // Helper to force switch
        function updateDisplayModeDirectly() {
            const news = document.getElementById('newsPresentation');
            const voting = document.getElementById('votingPresentation');
            const el = document.getElementById('topHeadline');
            const loc = document.getElementById('locationText');

            if (currentOverlayMode === 'news') {
                news.style.display = 'flex';
                voting.style.display = 'none';
                showVoting = false;
                if (votingHeaderInterval) clearInterval(votingHeaderInterval);
            } else if (currentOverlayMode === 'voting') {
                news.style.display = 'none';
                voting.style.display = 'flex';
                showVoting = true;

                loc.innerText = "நேரலை தொடர்கிறது"; // Live Coverage or similar
                votingHeaderIndex = 0;
                el.innerText = votingHeadlines[0];
                el.style.fontSize = "26px";
                el.style.whiteSpace = "nowrap";

                startVotingHeaderRotation();
            }
        }

        // --- NEWS HANDLING ---
        async function fetchNews() {
            try {
                const res = await fetch(API_BASE + '/news');
                newsItems = await res.json();
                updateTicker();
                if (!headlineInterval) startHeadlines();
            } catch (e) { console.error("News Fetch Error:", e); }
        }

        let lastTickerHash = "";

        function updateTicker() {
            const active = newsItems.filter(i => i.is_active);
            const track = document.getElementById('tickerTrack');

            if (active.length === 0) {
                track.innerHTML = "";
                return;
            }

            // Create single pass string
            const singlePassHtml = active.map(i =>
                `<span class="ticker-item"><i class="fas fa-circle" style="font-size:15px; color:#b90909;"></i> ${i.title_tamil}</span>`
            ).join('');

            // CHECK IF CONTENT CHANGED
            // If the content is identical to what we last rendered, DO NOT reset the animation
            if (singlePassHtml === lastTickerHash) {
                // Determine if we need to restart animation if it stopped? 
                // Usually no, CSS infinite loop handles it.
                // However, if the duration needs to change due to container resize?
                // For now, assume fixed container size.
                return;
            }

            lastTickerHash = singlePassHtml;

            // DUPLICATE CONTENT for seamless loop (A + A)
            // When we scroll to -50% (end of first A), we are visually at the start of second A,
            // which is identical to start of first A. Resetting to 0% is invisible.
            track.innerHTML = singlePassHtml + singlePassHtml;

            // Calculate Speed (Pixels Per Second)
            // We want constant speed regardless of content width
            const PIXELS_PER_SECOND = 150; // Adjust for speed

            // Measure clear width (approximate or wait for render)
            // Ideally we wait, but estimation is safe here for updates
            // We can use a short timeout to let DOM render width
            setTimeout(() => {
                const totalWidth = track.scrollWidth;
                const halfWidth = totalWidth / 2; // The width of one set of items

                // If content is too short to scroll (less than screen width), maybe just center it or duplicate more?
                // For now, standard behavior.

                const duration = halfWidth / PIXELS_PER_SECOND;

                track.style.animation = 'none';
                track.offsetHeight; /* trigger reflow */
                track.style.animation = `scroll-linear ${duration}s linear infinite`;
            }, 50);
        }



        // --- WEBSOCKET ---
        let voteCounts = {};
        let ttsQueue = [];
        let isSpeaking = false;
        let currentOverlayMode = 'voting'; // Default to voting (auto, news, voting)
        let voteRefreshStartTime = Date.now();
        const VOTE_REFRESH_INTERVAL = 30000; // 30 seconds

        function updateVoteProgressBar() {
            const elapsed = Date.now() - voteRefreshStartTime;
            const progress = Math.min((elapsed / VOTE_REFRESH_INTERVAL) * 100, 100);
            const progressBar = document.getElementById('voteRefreshProgress');
            if (progressBar) progressBar.style.width = progress + '%';
            requestAnimationFrame(updateVoteProgressBar);
        }

        function resetVoteRefreshTimer() {
            voteRefreshStartTime = Date.now();
        }

        const ws = new WebSocket(WS_URL);
        ws.onopen = () => console.log("WS Connected");
        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type.includes('NEWS')) fetchNews();
            if (msg.type === 'CONFIG_UPDATED') fetchConfig();
            if (msg.type === 'OVERLAY_UPDATED') updateMainScreen(msg.payload);
            if (msg.type === 'SHOW_NEWS_MAIN') {
                isNewsActive = true;
                showNewsLayout(msg.payload);
            }
            if (msg.type === 'NEW_VOTE') {
                showVPVotePopup(msg.payload);
                fetchVoteStats();
            }
        };

        // --- HELPER: Detect Media Type ---
        function getMediaType(url) {
            if (!url) return 'NONE';
            // Remove query params for extension check
            const cleanUrl = url.split('?')[0].toLowerCase();

            if (cleanUrl.match(/\.(mp4|webm|ogg|mov)$/)) return 'VIDEO';
            if (cleanUrl.match(/\.(m3u8)$/)) return 'HLS';
            if (cleanUrl.match(/\.(jpeg|jpg|gif|png|webp|bmp|svg)$/)) return 'IMAGE';
            return 'WEB';
        }

        // --- MAIN SCREEN LOGIC ---
        // Persistence
        let lastMainScreenData = { webview_url: "" };

        function updateMainScreen(data) {
            // If this is NOT an Ad, save it as the "Default" state
            if (data.type !== 'AD') {
                lastMainScreenData = { ...data };
            }

            // Hide News Layout if active (unless we are just updating background behind it?)
            // If ad, force hide. If config update, maybe not? 
            // generally updateMainScreen implies "Show this now".

            if (data.type === 'AD') {
                document.getElementById('newsPresentation').style.display = 'none';
            }

            renderMainScreen(data);
        }

        function renderMainScreen(data) {
            const webview = document.getElementById('webview');
            const video = document.getElementById('videoPlayer');
            const image = document.getElementById('imagePlayer');

            // Reset
            webview.style.display = 'none'; webview.src = "";
            video.style.display = 'none'; video.pause();
            video.removeAttribute('src'); // For HLS cleanup
            if (window.hls) { window.hls.destroy(); }
            image.style.display = 'none'; image.src = "";

            const url = data.webview_url;
            if (!url) return;

            const type = getMediaType(url);

            if (type === 'VIDEO') {
                video.src = url;
                video.style.display = 'block';
                video.play().catch(e => console.error("Autoplay failed", e));
            } else if (type === 'HLS') {
                video.style.display = 'block';
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    window.hls = hls; // Keep reference to destroy later
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function () {
                        video.play().catch(e => console.error("HLS Autoplay failed", e));
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // For Safari
                    video.src = url;
                    video.addEventListener('loadedmetadata', function () {
                        video.play().catch(e => console.error("HLS Native Autoplay failed", e));
                    });
                }
            } else if (type === 'IMAGE') {
                image.src = url;
                image.style.display = 'block';
            } else {
                // Assume Web/Iframe
                webview.src = url;
                webview.style.display = 'block';
            }
        }

        function restoreBackground() {
            // Called when News Layout hides
            renderMainScreen(lastMainScreenData);
        }

        // --- TRANSITION LOGIC ---
        let isTransitioning = false;

        async function showNewsLayout(item) {
            // Check if already showing this item to avoid redundant anims? 
            // Actually, for loop, we might want to re-show.

            const container = document.getElementById('newsPresentation');

            // If already visible, transition OUT first
            if (container.style.display === 'flex' && !isTransitioning) {
                isTransitioning = true;
                container.classList.add('page-exit');

                // Wait for animation
                await new Promise(r => setTimeout(r, 500));

                container.classList.remove('page-exit');
                // Reset scroll/state if needed
                isTransitioning = false;
            }

            // Hide standard players? 
            // If we hide them, we save resources, but we might have a black gap during transition.
            // Since newsPresentation is z-index 50 and transparent? No, it has background.
            // Let's NOT hide them immediately, but maybe pause video if it's heavy?
            // For smooth transition, keep them.

            // document.getElementById('webview').style.display = 'none';
            // document.getElementById('videoPlayer').style.display = 'none';
            // document.getElementById('imagePlayer').style.display = 'none';

            // Populate Data
            // Populate Data
            const cat = document.getElementById('npCategory');
            const tit = document.getElementById('npTitle');
            const desc = document.getElementById('npDescription');
            const meta = document.getElementById('npSource');

            if (cat) cat.innerText = item.category || 'NEWS';
            if (tit) tit.innerText = item.title;
            if (desc) desc.innerText = item.description || item.title; // Fallback
            if (meta) meta.innerHTML = `<i class="fas fa-link"></i> ${item.source}`;

            // --- RESET TEXT ANIMATIONS ---
            if (cat) cat.classList.remove('anim-tag-in');
            if (tit) tit.classList.remove('anim-title');
            if (desc) desc.classList.remove('anim-desc');
            if (meta) meta.classList.remove('anim-meta');

            if (tit) void tit.offsetWidth; // Reflow

            if (cat) cat.classList.add('anim-tag-in');
            if (tit) tit.classList.add('anim-title');
            if (desc) desc.classList.add('anim-desc');
            if (meta) meta.classList.add('anim-meta');

            // Handle Media
            const img = document.getElementById('npImage');
            const vid = document.getElementById('npVideo');
            const placeholder = document.getElementById('npPlaceholder');

            img.style.display = 'none';
            vid.style.display = 'none';
            vid.pause();
            vid.removeAttribute('src');
            if (window.newsHls) { window.newsHls.destroy(); }
            placeholder.style.display = 'none';
            img.classList.remove('ken-burns-active'); // Reset Ken Burns

            // Reset Toggle Class
            container.classList.remove('no-media');

            if (item.media_url && getMediaType(item.media_url) !== 'NONE') {
                const type = getMediaType(item.media_url);

                if (type === 'VIDEO') {
                    vid.src = item.media_url;
                    vid.style.display = 'block';
                    vid.play().catch(e => console.error("News AutoPlay Error:", e));
                } else if (type === 'HLS') {
                    vid.style.display = 'block';
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        window.newsHls = hls; // Keep reference to destroy later
                        hls.loadSource(item.media_url);
                        hls.attachMedia(vid);
                        hls.on(Hls.Events.MANIFEST_PARSED, function () {
                            vid.play().catch(e => console.error("News HLS AutoPlay Error:", e));
                        });
                    } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
                        // For Safari
                        vid.src = item.media_url;
                        vid.addEventListener('loadedmetadata', function () {
                            vid.play().catch(e => console.error("News Native HLS AutoPlay Error:", e));
                        });
                    }
                } else {
                    img.src = item.media_url;
                    img.style.display = 'block';

                    // Trigger Ken Burns Reflow
                    void img.offsetWidth;
                    img.classList.add('ken-burns-active');
                }
            } else {
                // NO MEDIA -> TEXT ONLY MODE
                container.classList.add('no-media');
            }

            // Show Container with ENTER animation
            container.style.display = 'flex';
            container.classList.remove('page-enter');
            void container.offsetWidth;
            container.classList.add('page-enter');

            // --- TRIGGER BACKEND TTS REMOVED ---
        }

        // --- ADVERTISEMENT LOGIC ---
        let activeAds = [];

        async function fetchAds() {
            try {
                const res = await fetch(API_BASE + '/ads/active');
                activeAds = await res.json();
            } catch (e) { }
        }

        function getAdsByType(type) {
            return activeAds.filter(a => a.type === type);
        }

        // --- FULLSCREEN ADS & INTERRUPTIONS ---
        let adIntervalHandle = null;
        const AD_CHECK_INTERVAL = 60000; // Check every minute

        function startAdScheduler() {
            if (adIntervalHandle) clearInterval(adIntervalHandle);

            // Check less frequently to avoid constant interruption, but enough to catch schedule
            adIntervalHandle = setInterval(() => {
                const fsAds = getAdsByType('FULLSCREEN');
                if (fsAds.length > 0 && Math.random() > 0.5) { // 50% chance to play if available, or use strict interval
                    // Pick one
                    const ad = fsAds[Math.floor(Math.random() * fsAds.length)];
                    playFullscreenAd(ad);
                }
            }, 5 * 60 * 1000); // 5 Minutes
        }

        function playFullscreenAd(ad) {
            // 1. Stop News Rotation
            if (headlineInterval) clearInterval(headlineInterval);

            // 2. Show Ad
            updateMainScreen({
                webview_url: ad.content,
                type: 'AD'
            });

            // 3. Resume after Duration
            setTimeout(() => {
                // Determine what to do next?
                // Ideally, go back to News Loop
                startHeadlines();
            }, ad.duration * 1000);
        }

        // --- CORE LOOP ---
        function startHeadlines() {
            if (headlineInterval) clearInterval(headlineInterval);
            // Immediate trigger
            rotateHeadline();
            // Loop
            headlineInterval = setInterval(rotateHeadline, 15000); // 15s per item
        }

        function rotateHeadline() {
            // Priority:
            // 1. If Ad is playing, do nothing? (Handled by clearing interval)

            if (newsItems.length === 0) return;

            // Main screen only shows items WITH an image/video
            // Items without media go only to the ticker scroll below
            let pool = newsItems.filter(i => i.is_active && i.media_url);

            if (pool.length === 0) {
                // No image news available — hide news presentation to show background stream
                isNewsActive = false;
                document.getElementById('newsPresentation').style.display = 'none';
                return;
            }

            headlineIndex = (headlineIndex + 1) % pool.length;
            const item = pool[headlineIndex];

            // --- HEADER UPDATE ---
            // Only update news headers if voting mode is NOT active to prevent conflicting text.
            if (currentOverlayMode !== 'voting') {
                const el = document.getElementById('topHeadline');
                el.classList.remove('animate-in');
                el.classList.add('animate-out');

                setTimeout(() => {
                    const text = item.title_tamil || "";
                    el.innerText = text;
                    // Sizing text
                    if (text.length > 50) {
                        el.style.fontSize = "22px";
                        el.style.whiteSpace = "normal";
                        el.style.lineHeight = "1.3";
                    } else {
                        el.style.fontSize = "32px";
                        el.style.whiteSpace = "nowrap";
                        el.style.lineHeight = "1.2";
                    }

                    // Location - Always show static label
                    document.getElementById('locationText').innerText = "அண்மை செய்திகள்";

                    el.classList.remove('animate-out');
                    el.classList.add('animate-in');
                }, 500);
            }


            const MAX_AGE_MS = 24 * 60 * 60 * 1000;
            const itemDate = new Date(item.created_at || new Date());
            const now = new Date();
            const isRecent = (now - itemDate) < MAX_AGE_MS;

            // --- MAIN SCREEN AUTOMATION ---
            // Always show news layout (it handles media/no-media internaly)

            // --- MAIN SCREEN AUTOMATION ---
            // Logic: If media exists, show split view.
            // If NOT, show Text-Only mode (Full width content).

            const displayItem = {
                id: item.id,
                title: item.title_tamil,
                category: item.category,
                media_url: item.media_url,
                source: item.source,
                description: item.title_english || item.title_tamil
            };
            showNewsLayout(displayItem);

        }





        // --- VOTING SYSTEM HELPERS ---
        let showVoting = true; // Default to true
        let isNewsActive = false;

        async function fetchVoteStats() {
            try {
                // Fetch Voting Config for Assets & Modes
                const resConfig = await fetch(`${API_BASE}/config/voting`);
                const config = await resConfig.json();
                if (config) {
                    window.votingConfig = config;
                    if (config.overlay_display_mode) {
                        currentOverlayMode = config.overlay_display_mode;
                        // Force update UI if not in auto
                        if (currentOverlayMode !== 'auto') {
                            updateDisplayModeDirectly();
                        }
                    }
                }

                const resCounts = await fetch(`${API_BASE}/votes/counts`);
                voteCounts = await resCounts.json();
                renderVPCounters();

                const resLatest = await fetch(`${API_BASE}/votes/latest`);
                const latest = await resLatest.json();
                renderVPVoterFeed(latest);
                resetVoteRefreshTimer();
            } catch (e) {
                console.error("Error fetching vote stats:", e);
            }
        }

        function renderVPCounters() {
            const container = document.getElementById('vpCounters');
            const assets = window.votingConfig?.party_assets || {};

            const parties = [
                {
                    code: 'DMK_PLUS',
                    tamil: 'திமுக+',
                    leader: assets.DMK_PLUS?.leader || 'media/leader_dmk.png',
                    symbol: assets.DMK_PLUS?.symbol || 'media/symbol_dmk.png'
                },
                {
                    code: 'ADMK_PLUS',
                    tamil: 'அதிமுக+',
                    leader: assets.ADMK_PLUS?.leader || 'media/leader_admk.png',
                    symbol: assets.ADMK_PLUS?.symbol || 'media/symbol_admk.png'
                },
                {
                    code: 'NTK',
                    tamil: 'நாம் தமிழர்',
                    leader: assets.NTK?.leader || 'media/leader_ntk.png',
                    symbol: assets.NTK?.symbol || 'media/symbol_ntk.png'
                },
                {
                    code: 'TVK',
                    tamil: 'தவெக',
                    leader: assets.TVK?.leader || 'media/leader_tvk.png',
                    symbol: assets.TVK?.symbol || 'media/symbol_tvk.png'
                }
            ];

            // Sort parties based on the number of votes secured (descending)
            parties.sort((a, b) => {
                const countA = voteCounts[a.code] || 0;
                const countB = voteCounts[b.code] || 0;
                return countB - countA;
            });

            container.innerHTML = parties.map((p, i) => {
                const count = voteCounts[p.code] || 0;
                const delay = i * 0.25;
                return `
                    <div class="vp-party-card" style="--delay: ${delay}s">
                        <div class="vp-party-info">
                            <span class="vp-party-name">${p.tamil}</span>
                            <span class="vp-party-count">${count.toLocaleString()}</span>
                        </div>
                        <div class="vp-leader-container">
                            <img src="${p.leader}" class="vp-leader-img" alt="">
                        </div>
                        <img src="${p.symbol}" class="vp-party-symbol" alt="">
                    </div>
                `;
            }).join('');
        }

        function renderVPVoterFeed(voters) {
            const container = document.getElementById('vpVoterFeed');
            // Duplicate the list for a seamless loop
            const feedHtml = voters.slice(0, 10).map(v => `
                <div class="vp-voter-item">
                    <img src="${v.profile_image_url}" class="vp-voter-img" alt="">
                    <div class="vp-voter-info">
                        <p>${v.display_name}</p>
                        <span>${v.party_tamil}</span>
                    </div>
                </div>
            `).join('');

            container.innerHTML = feedHtml + feedHtml;

            // Apply animation if there are enough items
            if (voters.length > 3) {
                container.classList.add('animate-scroll');
            } else {
                container.classList.remove('animate-scroll');
            }
        }

        function showVPVotePopup(voter) {
            const container = document.getElementById('votePopupContainer');
            const div = document.createElement('div');
            div.className = 'v-popup';
            div.innerHTML = `
                <img src="${voter.image}" alt="">
                <div>
                    <div style="font-weight: 900; font-size: 18px;">${voter.name}</div>
                    <div style="font-size: 11px; opacity: 0.8; font-weight: 700; text-transform: uppercase;">${voter.party} VOTED</div>
                </div>
            `;
            container.appendChild(div);

            // TTS
            queueTTS(`${voter.name} ${voter.party} க்கு வாக்களித்தார்`);

            setTimeout(() => {
                div.style.opacity = '0';
                div.style.transform = 'translateY(-20px)';
                setTimeout(() => div.remove(), 500);
            }, 5000);
        }

        function queueTTS(text) {
            ttsQueue.push(text);
            processTTS();
        }

        function processTTS() {
            if (isSpeaking || ttsQueue.length === 0) return;
            isSpeaking = true;
            const text = ttsQueue.shift();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ta-IN';
            utterance.onend = () => {
                isSpeaking = false;
                processTTS();
            };
            window.speechSynthesis.speak(utterance);
        }

        // --- CONTENT ROTATION ---
        function cycleContent() {
            if (currentOverlayMode === 'voting') {
                document.getElementById('newsPresentation').style.display = 'none';
                document.getElementById('votingPresentation').style.display = 'flex';
                return;
            }
            if (currentOverlayMode === 'news') {
                document.getElementById('votingPresentation').style.display = 'none';
                document.getElementById('newsPresentation').style.display = 'flex';
                return;
            }
            if (currentOverlayMode !== 'auto') return; // Respect manual mode

            const news = document.getElementById('newsPresentation');
            const voting = document.getElementById('votingPresentation');

            if (!isNewsActive && newsItems.filter(i => i.is_active && i.media_url).length === 0) {
                // If no active news, always show voting or nothing (video background)
                // For now, if no news, show voting.
                news.style.display = 'none';
                voting.style.display = 'flex';
                return;
            }

            showVoting = !showVoting;

            if (showVoting) {
                news.style.display = 'none';
                voting.style.display = 'flex';
            } else {
                voting.style.display = 'none';
                news.style.display = 'flex';
            }
        }

        // INIT
        fetchConfig();
        fetchNews();
        fetchAds();
        fetchVoteStats();
        updateVoteProgressBar();

        // Refresh votes every 30s
        setInterval(fetchVoteStats, VOTE_REFRESH_INTERVAL);

        // Start Rotation
        setInterval(cycleContent, 5000);

        // Start Scheduler
        setTimeout(startAdScheduler, 5000);

    </script>
</body>

</html>
